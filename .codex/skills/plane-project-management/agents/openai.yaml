interface:
  display_name: "Plane Project Management"
  short_description: "Orchestrate Plane-based project workflows"
  default_prompt: "Use $plane-project-management to create or organize a Plane project, its modules, parallel work items, and explicit reviewer work items."

dependencies:
  tools:
    - type: "mcp"
      value: "plane"
      description: "Plane MCP server for project, module, and work item management"

policy:
  allow_implicit_invocation: true
