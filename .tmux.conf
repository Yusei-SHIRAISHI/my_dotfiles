# shell
set-option -g default-shell "$SHELL"

# prefix
unbind-key C-b
set-option -g prefix C-t

# keybinds
bind C-r source-file ~/.tmux.conf

bind C-v split-window -vc '#{pane_current_path}'
bind C-h split-window -hc '#{pane_current_path}'

set -g default-terminal "screen-256color"
set-option -g status-bg "colour68"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# setting pane & window
bind x kill-pane
bind q kill-window
bind i display-panes

setw -g mode-keys vi
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection

# Prefer tmux's native clipboard path so it can use OSC 52 or a
# platform clipboard helper instead of a macOS-only pbcopy command.
if-shell 'command -v wl-copy >/dev/null 2>&1' 'set -s copy-command "wl-copy"'
if-shell 'command -v xclip >/dev/null 2>&1' 'set -s copy-command "xclip -selection clipboard -in"'
if-shell 'command -v xsel >/dev/null 2>&1' 'set -s copy-command "xsel --clipboard --input"'
if-shell 'command -v pbcopy >/dev/null 2>&1' 'set -s copy-command "pbcopy"'

bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
